<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Beerpong Liga</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#f5f4f0;--surface:#fff;--border:#e2e0d8;--border2:#cccac0;
      --text:#1a1917;--muted:#6b6960;--faint:#9b9890;
      --blue:#3a6fd8;--blue-bg:#eef2fc;--blue-text:#1e3f80;
      --green:#2a7a4b;--green-bg:#e8f5ee;--green-text:#164d2e;
      --gray-bg:#f0ede6;--gray-text:#4a4843;
      --r:8px;--rl:12px;
    }
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-size:15px;line-height:1.6;color:var(--text);background:var(--bg);min-height:100vh}
    .topbar{position:sticky;top:0;z-index:100;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:16px;padding:0 24px;height:56px}
    .topbar-brand{display:flex;align-items:center;gap:8px;font-weight:600;font-size:15px}
    .topbar-nav{display:flex;gap:2px;flex:1}
    .nav-btn{padding:6px 14px;border:none;background:none;cursor:pointer;font-size:14px;font-family:inherit;color:var(--muted);border-radius:var(--r);border-bottom:2px solid transparent}
    .nav-btn:hover{color:var(--text);background:var(--bg)}
    .nav-btn.active{color:var(--blue);border-bottom-color:var(--blue)}
    .topbar-user{display:flex;align-items:center;gap:8px}
    .user-name{font-size:13px;color:var(--muted)}
    .btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border:1px solid var(--border2);border-radius:var(--r);background:var(--surface);color:var(--text);font-size:14px;font-family:inherit;cursor:pointer}
    .btn:hover{background:var(--bg)}
    .btn-primary{background:var(--blue);color:#fff;border-color:var(--blue)}
    .btn-primary:hover{background:#2d5ab5}
    .btn-ghost{border-color:transparent;background:transparent}
    .btn-ghost:hover{background:var(--bg)}
    .btn-sm{padding:5px 10px;font-size:13px}
    .btn-full{width:100%;justify-content:center}
    .login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center}
    .login-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:2.5rem 2rem;width:360px;box-shadow:0 1px 3px rgba(0,0,0,.07)}
    .login-logo{font-size:48px;text-align:center;margin-bottom:8px}
    .login-title{font-size:22px;font-weight:600;text-align:center}
    .login-sub{font-size:13px;color:var(--muted);text-align:center;margin-bottom:20px}
    .role-picker{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
    .role-btn{display:flex;flex-direction:column;align-items:center;gap:8px;padding:20px 12px;border:2px solid var(--border);border-radius:var(--rl);background:var(--bg);cursor:pointer;font-family:inherit}
    .role-btn:hover,.role-btn.active{border-color:var(--blue);background:var(--blue-bg)}
    .role-icon{font-size:32px}
    .role-label{font-size:14px;font-weight:600;color:var(--text)}
    .content{max-width:900px;margin:0 auto;padding:24px 24px 60px}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:1.5rem;margin-bottom:1.25rem;box-shadow:0 1px 3px rgba(0,0,0,.07)}
    .card-title{font-size:16px;font-weight:600;margin-bottom:4px}
    .card-desc{font-size:13px;color:var(--muted);margin-bottom:16px}
    .field{margin-bottom:14px}
    .field label{display:block;font-size:13px;color:var(--muted);margin-bottom:4px}
    .field-row{display:flex;align-items:center;gap:12px;margin-bottom:12px;flex-wrap:wrap}
    .field-row label{font-size:13px;color:var(--muted);min-width:160px}
    input,select{padding:8px 11px;border:1px solid var(--border2);border-radius:var(--r);font-size:14px;font-family:inherit;background:var(--surface);color:var(--text);width:220px}
    input:focus,select:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(58,111,216,.12)}
    input[type=date],input[type=time]{width:170px}
    .err-msg{color:#c0392b;font-size:13px;margin-bottom:10px}
    .notice{background:#fef9ec;border:1px solid #f0d060;border-radius:var(--r);padding:10px 14px;font-size:13px;color:#7a5c00;margin:10px 0 14px}
    .pw-display{display:flex;align-items:center;padding:8px 12px;background:var(--bg);border:1px solid var(--border);border-radius:var(--r);min-width:160px}
    .pw-value{font-family:monospace;font-size:15px;font-weight:600;color:var(--blue);letter-spacing:1px}
    .pw-empty{font-size:13px;color:var(--faint);font-style:italic}
    .prio-list{display:flex;flex-direction:column;gap:6px}
    .prio-row{display:flex;align-items:center;gap:12px;padding:10px 14px;border:1px solid var(--border);border-radius:var(--r);background:var(--surface);cursor:grab;user-select:none}
    .prio-handle{font-size:16px;color:var(--faint)}
    .prio-label{flex:1;font-size:14px}
    .prio-rank{font-size:12px;color:var(--faint)}
    .teams-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
    @media(max-width:600px){.teams-grid{grid-template-columns:1fr}}
    .team-col{background:var(--bg);border-radius:var(--r);padding:14px;border:1px solid var(--border)}
    .team-header{display:flex;align-items:center;gap:8px;margin-bottom:12px}
    .team-header input{width:100%;min-width:0;flex:1}
    .player-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
    .player-row input,.player-row select{width:100%;min-width:0;flex:1}
    .player-num{font-size:12px;color:var(--muted);min-width:18px;text-align:right}
    .double-block{margin-bottom:12px}
    .double-label{margin-bottom:4px}
    .double-inputs{display:flex;gap:8px;flex-wrap:wrap}
    .double-inputs select{flex:1;min-width:100px;width:auto}
    .tag{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
    .tag-blue{background:var(--blue-bg);color:var(--blue-text)}
    .tag-green{background:var(--green-bg);color:var(--green-text)}
    .tag-gray{background:var(--gray-bg);color:var(--gray-text)}
    .avail-table{width:100%;border-collapse:collapse;font-size:13px}
    .avail-table th{text-align:left;padding:8px 10px;font-size:12px;font-weight:600;color:var(--muted);border-bottom:1px solid var(--border);white-space:nowrap}
    .avail-table td{padding:6px 8px;border-bottom:1px solid var(--border);vertical-align:middle}
    .avail-table tr:last-child td{border-bottom:none}
    .avail-table td:first-child{font-weight:500;white-space:nowrap;min-width:110px}
    .time-slots{display:flex;flex-wrap:wrap;gap:4px}
    .time-slot{padding:3px 8px;border-radius:20px;font-size:12px;cursor:pointer;border:1px solid var(--border2);background:var(--surface);color:var(--muted);user-select:none}
    .time-slot:hover{border-color:var(--blue);color:var(--blue)}
    .time-slot.on{background:var(--blue);color:#fff;border-color:var(--blue)}
    .match-table{width:100%;border-collapse:collapse;font-size:13px}
    .match-table th{text-align:left;padding:8px 10px;font-size:12px;font-weight:600;color:var(--muted);border-bottom:1px solid var(--border)}
    .match-table td{padding:9px 10px;border-bottom:1px solid var(--border)}
    .match-table tr:last-child td{border-bottom:none}
    .vs-cell{text-align:center;color:var(--faint)}
    .date-cell{white-space:nowrap;color:var(--muted)}
    .empty-state{color:var(--muted);font-size:14px;padding:12px 0}
    .toast{position:fixed;bottom:24px;right:24px;background:#1a1917;color:#fff;padding:10px 18px;border-radius:var(--r);font-size:13px;opacity:0;transition:opacity .25s;pointer-events:none;z-index:999}
    .toast-err{background:#c0392b}
    /* Gantt */
    .gantt-day{margin-bottom:28px}
    .gantt-title{font-size:15px;font-weight:700;margin-bottom:10px;padding:8px 14px;background:var(--blue-bg);border-left:4px solid var(--blue);border-radius:var(--r);color:var(--blue-text)}
    .gantt-row{display:flex;align-items:center;margin-bottom:5px;gap:0}
    .gantt-label{width:120px;min-width:120px;display:flex;align-items:center;gap:5px;padding-right:8px}
    .gantt-slots{flex:1;display:flex;gap:3px}
    .gantt-slot{flex:1;height:30px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;cursor:pointer;border:1px solid transparent;transition:transform .1s}
    .gantt-slot:hover{transform:scale(1.02)}
    .gantt-btn{width:130px;min-width:130px;padding-left:10px;display:flex;gap:5px;align-items:center}
  </style>
</head>
<body>
<div id="root"></div>
<div class="toast" id="toast"></div>
<script>
const BIN_ID  = "6a2dbe72f5f4af5e29ed3aae";
const API_KEY = "$2a$10$3LtezdRQg2Ne0/9WICvsXucZI5a/LIQeQt4OH7D3eYipzjqhEDDn6";
const BIN_URL = "https://api.jsonbin.io/v3/b/"+BIN_ID;

const DEF = {
  settings:{startDate:"",spielerPassword:"",dayPriority:["Freitag","Samstag","Donnerstag","Mittwoch","Dienstag","Montag","Sonntag"]},
  teams:{team1:{name:"Team A",players:["","","","","","","",""]},team2:{name:"Team B",players:["","","","","","","",""]}},
  doubles:{team1:[["",""],["",""],["",""],["",""]],team2:[["",""],["",""],["",""],["",""]]},
  schedule:[],matchAssignments:{},matchSlots:{},availability:{}
};

let S=JSON.parse(JSON.stringify(DEF));
let currentUser=null,currentView="login",loginRole=null,dragSrc=null,selectedSpieler=null;

async function loadData(){
  try{
    const r=await fetch(BIN_URL+"/latest",{headers:{"X-Master-Key":API_KEY,"X-Access-Key":API_KEY,"X-Bin-Meta":"false"}});
    if(r.ok){
      const d=await r.json();
      if(d&&d.settings){
        S.settings=Object.assign({},DEF.settings,d.settings||{});
        S.teams=Object.assign({},DEF.teams,d.teams||{});
        S.doubles=Object.assign({},DEF.doubles,d.doubles||{});
        S.schedule=d.schedule||[];
        S.matchAssignments=d.matchAssignments||{};
        S.matchSlots=d.matchSlots||{};
        S.availability=d.availability||{};
      }
    }
  }catch(e){console.error(e);}
  render();
}

async function push(){
  try{
    const r=await fetch(BIN_URL,{method:"PUT",headers:{"Content-Type":"application/json","X-Master-Key":API_KEY,"X-Access-Key":API_KEY},
      body:JSON.stringify({settings:S.settings,teams:S.teams,doubles:S.doubles,schedule:S.schedule,matchAssignments:S.matchAssignments,matchSlots:S.matchSlots,availability:S.availability})});
    if(!r.ok) throw new Error("Status "+r.status);
    toast("Gespeichert ✓");
  }catch(e){toast("⚠ Fehler: "+e.message,true);}
}

setInterval(()=>{if(currentUser)loadData();},30000);

const DAY=["Sonntag","Montag","Dienstag","Mittwoch","Donnerstag","Freitag","Samstag"];
const dn=d=>DAY[d.getDay()];
const fmt=d=>d.toLocaleDateString("de-DE",{day:"2-digit",month:"2-digit"});
const fmtFull=d=>d.toLocaleDateString("de-DE",{weekday:"long",day:"2-digit",month:"2-digit",year:"numeric"});
function pad(n){return n<10?"0"+n:String(n);}

function getSlots(dayIdx){
  // 45-min slots; Sa/So from 12:00, Mo-Fr from 17:00
  const slots=[];
  let startMin=(dayIdx===0||dayIdx===6)?12*60:17*60;
  let endMin=23*60;
  for(let m=startMin;m<=endMin;m+=45) slots.push(pad(Math.floor(m/60))+":"+pad(m%60));
  return slots;
}

function getPlayDays(){
  if(!S.settings.startDate) return [];
  const start=new Date(S.settings.startDate);
  return Array.from({length:12},(_,i)=>{const d=new Date(start);d.setDate(d.getDate()+2+i);return d;});
}

function allPlayers(){
  return [...S.teams.team1.players,...S.teams.team2.players].filter(p=>p.trim());
}

function buildMatches(){
  const t1=S.teams.team1,t2=S.teams.team2,m=[];
  for(let i=0;i<8;i++) m.push({id:"E"+(i+1),type:"Einzel",p1:t1.players[i]||"Spieler "+(i+1),p2:t2.players[i]||"Spieler "+(i+1)});
  for(let i=0;i<4;i++){
    const d1=S.doubles.team1[i],d2=S.doubles.team2[i];
    m.push({id:"D"+(i+1),type:"Doppel",p1:(d1[0]||"S"+(2*i+1))+" & "+(d1[1]||"S"+(2*i+2)),p2:(d2[0]||"S"+(2*i+1))+" & "+(d2[1]||"S"+(2*i+2))});
  }
  return m;
}

function getPossibleSlots(m){
  const days=getPlayDays(),result=[];
  const p1n=m.p1.includes(" & ")?m.p1.split(" & "):[m.p1];
  const p2n=m.p2.includes(" & ")?m.p2.split(" & "):[m.p2];
  const names=[...p1n,...p2n].map(n=>n.trim()).filter(n=>n);
  days.forEach(d=>{
    const ds=d.toISOString().slice(0,10);
    const slots=getSlots(d.getDay());
    const common=slots.filter(t=>names.every(name=>((S.availability[name]||{})[ds]||[]).includes(t)));
    if(common.length>0) result.push({date:d,ds,slots:common});
  });
  return result;
}

function getMatchesByDay(){
  const days=getPlayDays(),matches=buildMatches(),byDay={};
  const prio=S.settings.dayPriority;
  days.forEach(d=>{
    const ds=d.toISOString().slice(0,10);
    matches.forEach(m=>{
      const p=getPossibleSlots(m).find(x=>x.ds===ds);
      if(p){
        if(!byDay[ds]) byDay[ds]={date:d,matches:[]};
        byDay[ds].matches.push({m,slots:p.slots});
      }
    });
  });
  return Object.entries(byDay).sort((a,b)=>{
    const da=new Date(a[0]),db=new Date(b[0]);
    const ai=prio.indexOf(DAY[da.getDay()]),bi=prio.indexOf(DAY[db.getDay()]);
    if(ai!==bi) return (ai<0?99:ai)-(bi<0?99:bi);
    return a[0].localeCompare(b[0]);
  }).map(([ds,v])=>({ds,...v}));
}

function toast(msg,err){
  const t=document.getElementById("toast");
  t.className="toast"+(err?" toast-err":"");t.textContent=msg;t.style.opacity="1";
  clearTimeout(t._t);t._t=setTimeout(()=>t.style.opacity="0",2800);
}

function hdr(tab){
  const isAdmin=currentUser==="admin";
  let nav='';
  if(isAdmin) nav+='<button class="nav-btn '+(tab==="einstellungen"?"active":"")+('" onclick="setView(\'admin\')">Einstellungen</button>');
  nav+='<button class="nav-btn '+(tab==="verfuegbarkeit"?"active":"")+('" onclick="setView(currentUser===\'admin\'?\'admin_avail\':\'spieler_avail\')">Verfügbarkeit</button>');
  nav+='<button class="nav-btn '+(tab==="spielplan"?"active":"")+('" onclick="setView(currentUser===\'admin\'?\'admin_plan\':\'spieler_plan\')">Spielplan</button>');
  nav+='<button class="nav-btn '+(tab==="spiele"?"active":"")+('" onclick="setView(\'spiele\')">Alle Spiele</button>');
  return '<header class="topbar"><div class="topbar-brand"><span style="font-size:20px">🍺</span><span>Beerpong Liga</span></div>'
    +'<nav class="topbar-nav">'+nav+'</nav>'
    +'<div class="topbar-user"><span class="user-name">'+currentUser+'</span>'
    +'<button class="btn btn-ghost btn-sm" onclick="logout()">Abmelden</button></div></header>';
}

function setView(v){currentView=v;render();}
function render(){
  ({login:rLogin,admin:rAdmin,admin_avail:rAdminAvail,admin_plan:rAdminPlan,spieler_avail:rSpielerAvail,spieler_plan:rSpielerPlan,spiele:rSpiele}[currentView]||rLogin)();
}

// ── Login ──────────────────────────────────────────────────────
function rLogin(){
  document.getElementById("root").innerHTML=
    '<div class="login-wrap"><div class="login-card">'
    +'<div class="login-logo">🍺</div>'
    +'<h1 class="login-title">Beerpong Liga</h1>'
    +'<p class="login-sub">Wer bist du?</p>'
    +'<div class="role-picker">'
    +'<button class="role-btn '+(loginRole==="admin"?"active":"")+('" onclick="selRole(\'admin\')"><span class="role-icon">🔧</span><span class="role-label">Admin</span></button>')
    +'<button class="role-btn '+(loginRole==="spieler"?"active":"")+('" onclick="selRole(\'spieler\')"><span class="role-icon">🏓</span><span class="role-label">Spieler</span></button>')
    +'</div>'
    +'<div id="pw-section" style="display:'+(loginRole?"block":"none")+'">'
    +'<div class="field"><label>'+(loginRole==="admin"?"Admin-Passwort":"Spieler-Passwort")+'</label>'
    +'<input id="lp" type="password" placeholder="Passwort" style="width:100%" onkeydown="if(event.key===\'Enter\')doLogin()" /></div>'
    +'<p class="err-msg" id="lerr" style="display:none">Falsches Passwort.</p>'
    +'<button class="btn btn-primary btn-full" onclick="doLogin()">Anmelden</button>'
    +'</div></div></div>';
}
function selRole(r){loginRole=r;rLogin();setTimeout(()=>{const el=document.getElementById("lp");if(el)el.focus();},50);}
async function doLogin(){
  const p=document.getElementById("lp").value;
  if(loginRole==="admin"&&p==="jaaxjaax"){currentUser="admin";await loadData();setView("admin");}
  else if(loginRole==="spieler"){
    document.getElementById("lp").disabled=true;
    await loadData();
    document.getElementById("lp").disabled=false;
    if(S.settings.spielerPassword&&p===S.settings.spielerPassword){currentUser="Spieler";setView("spieler_avail");}
    else{document.getElementById("lerr").style.display="block";}
  } else{document.getElementById("lerr").style.display="block";}
}
function logout(){currentUser=null;loginRole=null;setView("login");}

// ── Admin Einstellungen ────────────────────────────────────────
function rAdmin(){
  const s=S.settings,t1=S.teams.team1,t2=S.teams.team2,d1=S.doubles.team1,d2=S.doubles.team2;
  let note="";

  function pOpts(team,sel){

    team.players.forEach(p=>{if(p)o+='<option value="'+p+'"'+(sel===p?" selected":"")+'>'+p+'</option>';});

  }
  let html=hdr("einstellungen")+'<main class="content">';

  html+='</div><button class="btn btn-primary" style="margin-top:12px" onclick="savePrio()">Speichern</button></section>';

  html+='<section class="card"><h2 class="card-title">👥 Teams & Spieler</h2><div class="teams-grid">';
  html+='<div class="team-col"><div class="team-header"><span class="tag tag-blue">Team 1</span><input id="tn1" type="text" value="'+t1.name+'" /></div>';
  t1.players.forEach((p,i)=>{html+='<div class="player-row"><span class="player-num">'+(i+1)+'</span><input class="p1" data-i="'+i+'" type="text" value="'+p+'" placeholder="Spieler '+(i+1)+'" /></div>';});
  html+='</div><div class="team-col"><div class="team-header"><span class="tag tag-green">Team 2</span><input id="tn2" type="text" value="'+t2.name+'" /></div>';
  t2.players.forEach((p,i)=>{html+='<div class="player-row"><span class="player-num">'+(i+1)+'</span><input class="p2" data-i="'+i+'" type="text" value="'+p+'" placeholder="Spieler '+(i+1)+'" /></div>';});
  html+='</div></div><button class="btn btn-primary" style="margin-top:14px" onclick="savePlayers()">Spieler speichern</button></section>';

  html+='<section class="card"><h2 class="card-title">🤝 Doppelaufstellung</h2><div class="teams-grid">';
  html+='<div class="team-col"><div class="team-header"><span class="tag tag-blue">'+t1.name+'</span></div>';
  [0,1,2,3].forEach(i=>{html+='<div class="double-block"><div class="double-label"><span class="tag tag-blue">D'+(i+1)+'</span></div><div class="double-inputs"><select class="d1a" data-i="'+i+'">'+pOpts(t1,d1[i][0])+'</select><select class="d1b" data-i="'+i+'">'+pOpts(t1,d1[i][1])+'</select></div></div>';});
  html+='</div><div class="team-col"><div class="team-header"><span class="tag tag-green">'+t2.name+'</span></div>';
  [0,1,2,3].forEach(i=>{html+='<div class="double-block"><div class="double-label"><span class="tag tag-green">D'+(i+1)+'</span></div><div class="double-inputs"><select class="d2a" data-i="'+i+'">'+pOpts(t2,d2[i][0])+'</select><select class="d2b" data-i="'+i+'">'+pOpts(t2,d2[i][1])+'</select></div></div>';});
  html+='</div></div><button class="btn btn-primary" style="margin-top:14px" onclick="saveDoubles()">Doppel speichern</button></section>';

  html+='<section class="card"><h2 class="card-title">⚠️ Reset</h2><p class="card-desc">Alle Daten zurücksetzen.</p>';
  html+='<button class="btn" style="background:#c0392b;color:#fff;border-color:#c0392b" onclick="resetAll()">🗑 Zurücksetzen</button></section></main>';
  document.getElementById("root").innerHTML=html;
}
function saveSettings(){
  S.settings.spielerPassword=document.getElementById("spw").value;
  S.settings.startDate=document.getElementById("sd").value;
  push().then(()=>rAdmin());
}
function dsEv(e){dragSrc=parseInt(e.currentTarget.dataset.idx);}
function doEv(e){e.preventDefault();}
function ddEv(e){
  e.preventDefault();
  const t=parseInt(e.currentTarget.dataset.idx);
  if(dragSrc===null||dragSrc===t)return;
  const a=S.settings.dayPriority,item=a.splice(dragSrc,1)[0];
  a.splice(t,0,item);dragSrc=null;rAdmin();
}
function savePrio(){push().then(()=>toast("Priorisierung gespeichert ✓"));}
function savePlayers(){
  S.teams.team1.name=document.getElementById("tn1").value||"Team A";
  S.teams.team2.name=document.getElementById("tn2").value||"Team B";
  document.querySelectorAll(".p1").forEach(el=>S.teams.team1.players[+el.dataset.i]=el.value);
  document.querySelectorAll(".p2").forEach(el=>S.teams.team2.players[+el.dataset.i]=el.value);
  push();
}
function saveDoubles(){
  document.querySelectorAll(".d1a").forEach(el=>S.doubles.team1[+el.dataset.i][0]=el.value);
  document.querySelectorAll(".d1b").forEach(el=>S.doubles.team1[+el.dataset.i][1]=el.value);
  document.querySelectorAll(".d2a").forEach(el=>S.doubles.team2[+el.dataset.i][0]=el.value);
  document.querySelectorAll(".d2b").forEach(el=>S.doubles.team2[+el.dataset.i][1]=el.value);
  push();
}
function resetAll(){
  if(!confirm("Wirklich alle Daten zurücksetzen?"))return;
  S=JSON.parse(JSON.stringify(DEF));
  push().then(()=>{toast("Zurückgesetzt ✓");rAdmin();});
}

// ── Verfügbarkeit Spieler ──────────────────────────────────────
function rSpielerAvail(){
  const days=getPlayDays(),players=allPlayers();
  let html=hdr("verfuegbarkeit")+'<main class="content"><section class="card"><h2 class="card-title">📅 Deine Verfügbarkeit</h2>';
  html+='<p class="card-desc">Wähle deinen Namen und klicke die Zeitslots an.</p>';
  html+='<div class="field-row"><label>Dein Name</label><select id="spieler-name" onchange="onSpielerSelect(this.value)" style="width:200px"><option value="">– Name wählen –</option>';
  players.forEach(p=>{html+='<option value="'+p+'"'+(selectedSpieler===p?" selected":"")+'>'+p+'</option>';});
  html+='</select></div>';
  if(selectedSpieler&&days.length>0){
    html+='<div style="overflow-x:auto"><table class="avail-table"><thead><tr><th>Tag</th><th>Verfügbare Zeiten</th></tr></thead><tbody>';
    days.forEach(d=>{
      const ds=d.toISOString().slice(0,10);
      const slots=getSlots(d.getDay());
      const sel=(S.availability[selectedSpieler]||{})[ds]||[];
      html+='<tr><td><strong>'+dn(d)+'</strong><br><span style="font-size:11px;color:var(--muted)">'+fmt(d)+'</span></td><td><div class="time-slots">';
      slots.forEach(t=>{html+='<span class="time-slot'+(sel.includes(t)?" on":"")+'" onclick="toggleSlot(\''+ds+'\',\''+t+'\')">'+t+'</span>';});
      html+='</div></td></tr>';
    });
    html+='</tbody></table></div>';
  } else if(!selectedSpieler){
    html+='<p class="empty-state">Bitte Namen auswählen.</p>';
  } else {
    html+='<p class="empty-state">Noch kein Startdatum vom Admin gesetzt.</p>';
  }
  html+='</section></main>';
  document.getElementById("root").innerHTML=html;
}
function onSpielerSelect(name){selectedSpieler=name;rSpielerAvail();}
function toggleSlot(ds,time){
  if(!selectedSpieler)return;
  if(!S.availability[selectedSpieler])S.availability[selectedSpieler]={};
  if(!S.availability[selectedSpieler][ds])S.availability[selectedSpieler][ds]=[];
  const arr=S.availability[selectedSpieler][ds];
  const idx=arr.indexOf(time);
  if(idx>=0)arr.splice(idx,1);else arr.push(time);
  rSpielerAvail();
  push();
}

// ── Verfügbarkeit Admin ────────────────────────────────────────
function rAdminAvail(){
  const days=getPlayDays(),players=allPlayers();
  let html=hdr("verfuegbarkeit")+'<main class="content"><section class="card"><h2 class="card-title">📊 Verfügbarkeitsübersicht</h2>';
  if(days.length===0){html+='<p class="empty-state">Kein Startdatum gesetzt.</p></section></main>';document.getElementById("root").innerHTML=html;return;}
  html+='<div style="overflow-x:auto"><table class="avail-table"><thead><tr><th>Tag</th>';
  players.forEach(p=>{html+='<th>'+p+'</th>';});
  html+='</tr></thead><tbody>';
  days.forEach(d=>{
    const ds=d.toISOString().slice(0,10);
    html+='<tr><td><strong>'+dn(d)+'</strong><br><span style="font-size:11px;color:var(--muted)">'+fmt(d)+'</span></td>';
    players.forEach(p=>{
      const avail=(S.availability[p]||{})[ds]||[];
      if(avail.length===0){html+='<td style="color:var(--faint);font-size:12px">–</td>';}
      else{html+='<td><div class="time-slots">';avail.sort().forEach(t=>{html+='<span class="time-slot on" style="cursor:default;font-size:11px">'+t+'</span>';});html+='</div></td>';}
    });
    html+='</tr>';
  });
  html+='</tbody></table></div></section></main>';
  document.getElementById("root").innerHTML=html;
}

// ── Gantt ──────────────────────────────────────────────────────
function renderGanttDay(ds,date,matchRows,showAssign){
  let html='<div class="gantt-day"><div class="gantt-title">'+fmtFull(date)+'</div>';
  matchRows.forEach(({m,slots})=>{
    const isAss=S.matchAssignments[m.id]===ds;
    const picked=S.matchSlots[m.id];
    const bg=isAss?"#dce8fb":(m.type==="Einzel"?"#d0eddc":"#faeeda");
    const bdr=isAss?"#3a6fd8":(m.type==="Einzel"?"#3dab6b":"#c8860a");
    const txt=isAss?"#1a4fa0":(m.type==="Einzel"?"#164d2e":"#633806");

    html+='<div class="gantt-row">';
    // Label
    html+='<div class="gantt-label">';
    html+='<span class="tag '+(m.type==="Einzel"?"tag-blue":"tag-green")+'">'+m.id+'</span>';
    html+='<span style="font-size:11px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:65px" title="'+m.p1+' vs '+m.p2+'">'+m.p1.split(" & ")[0].split(" ")[0]+'</span>';
    if(isAss) html+='<span style="color:#3a6fd8;font-size:11px;font-weight:700">✓</span>';
    html+='</div>';
    // Slots
    html+='<div class="gantt-slots">';
    slots.forEach(t=>{
      const isSel=isAss&&picked===t;
      html+='<div class="gantt-slot" style="'
        +'background:'+(isSel?"#3a6fd8":bg)+';'
        +'border-color:'+(isSel?"#1a4fa0":bdr)+';'
        +'color:'+(isSel?"#fff":txt)+';'
        +'cursor:'+(showAssign?"pointer":"default")+'"';
      if(showAssign) html+=' onclick="pickSlot(\''+m.id+'\',\''+ds+'\',\''+t+'\')" title="'+t+' Uhr wählen"';
      html+='>'+t+'</div>';
    });
    html+='</div>';
    // Button (admin only)
    if(showAssign){
      html+='<div class="gantt-btn">';
      if(isAss){
        html+='<span style="font-size:11px;color:#3a6fd8;font-weight:600;white-space:nowrap">'+(picked?picked+" Uhr":"–")+'</span>';
        html+='<button class="btn btn-sm" style="background:#c0392b;color:#fff;border-color:#c0392b;font-size:11px;padding:3px 7px" onclick="unpickSlot(\''+m.id+'\')">✕</button>';
      } else {
        html+='<span style="font-size:11px;color:var(--faint)">← Slot wählen</span>';
      }
      html+='</div>';
    }
    html+='</div>'; // gantt-row
  });
  html+='</div>';
  return html;
}

function pickSlot(mid,day,time){
  S.matchAssignments[mid]=day;
  S.matchSlots[mid]=time;
  push().then(()=>rAdminPlan());
}
function unpickSlot(mid){
  delete S.matchAssignments[mid];
  delete S.matchSlots[mid];
  push().then(()=>rAdminPlan());
}

// ── Admin Spielplan ────────────────────────────────────────────
function rAdminPlan(){
  if(!S.settings.startDate){
    document.getElementById("root").innerHTML=hdr("spielplan")+'<main class="content"><div class="card"><p class="empty-state">⚠️ Bitte zuerst ein Startdatum festlegen.</p></div></main>';
    return;
  }
  const byDay=getMatchesByDay();
  let html=hdr("spielplan")+'<main class="content"><section class="card">';
  html+='<h2 class="card-title">📊 Mögliche Spieltermine</h2>';
  html+='<p class="card-desc">Grün = Einzel, Gelb = Doppel. Slot anklicken → zuweisen. Blau = fixiert.</p>';
  if(byDay.length===0){html+='<p class="empty-state">Noch keine Verfügbarkeiten eingetragen.</p>';}
  else{byDay.forEach(({ds,date,matches})=>{html+=renderGanttDay(ds,date,matches,true);});}
  html+='</section></main>';
  document.getElementById("root").innerHTML=html;
}

// ── Spieler Spielplan ──────────────────────────────────────────
function rSpielerPlan(){
  const byDay=getMatchesByDay();
  let html=hdr("spielplan")+'<main class="content"><section class="card">';
  html+='<h2 class="card-title">📊 Mögliche Spieltermine</h2>';
  html+='<p class="card-desc">Grüne Slots = du und dein Gegner sind verfügbar.</p>';
  if(byDay.length===0){html+='<p class="empty-state">Noch keine Verfügbarkeiten vorhanden.</p>';}
  else{byDay.forEach(({ds,date,matches})=>{html+=renderGanttDay(ds,date,matches,false);});}
  html+='</section></main>';
  document.getElementById("root").innerHTML=html;
}

// ── Alle Spiele ────────────────────────────────────────────────
function rSpiele(){
  const matches=buildMatches();
  function tbl(list){
    let t='<table class="match-table"><thead><tr><th>#</th><th>'+S.teams.team1.name+'</th><th></th><th>'+S.teams.team2.name+'</th><th>Termin</th></tr></thead><tbody>';
    list.forEach(m=>{
      const ds=S.matchAssignments[m.id],d=ds?new Date(ds):null;
      const slot=S.matchSlots[m.id];
      let timeStr="–";
      if(d) timeStr=dn(d).slice(0,2)+". "+fmt(d)+(slot?", "+slot+" Uhr":"");
      t+='<tr><td><span class="tag '+(m.type==="Einzel"?"tag-blue":"tag-green")+'">'+m.id+'</span></td>';
      t+='<td>'+m.p1+'</td><td class="vs-cell">vs</td><td>'+m.p2+'</td>';
      t+='<td class="date-cell">'+timeStr+'</td></tr>';
    });
    return t+'</tbody></table>';
  }
  document.getElementById("root").innerHTML=hdr("spiele")+'<main class="content">'
    +'<section class="card"><h2 class="card-title">🏆 Einzel (E1–E8)</h2>'+tbl(matches.filter(m=>m.type==="Einzel"))+'</section>'
    +'<section class="card"><h2 class="card-title">🤝 Doppel (D1–D4)</h2>'+tbl(matches.filter(m=>m.type==="Doppel"))+'</section></main>';
}
